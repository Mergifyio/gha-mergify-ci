name: Update documentation

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  autodoc:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Run auto-doc
        uses: tj-actions/auto-doc@b10ceedffd794ec29a8fa8700529f40c1b64a951 # v3.6.0
        with:
          use_code_blocks: true
          col_max_words: 120
          use_major_version: true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: "chore: update documentation for ${{ github.event.release.tag_name }}"
          title: "chore: update documentation for ${{ github.event.release.tag_name }}"
          body: |
            Auto-generated documentation update after release ${{ github.event.release.tag_name }}.
          branch: devs/autodoc/update-${{ github.event.release.tag_name }}

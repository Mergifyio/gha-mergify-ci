name: Continuous Integration
permissions: read-all

on:
  pull_request:
    branches:
      - main
      - devs/**

concurrency:
  # yamllint disable-line rule:line-length
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linters:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python 🔧
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.14.6

      - name: Check workflow files
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color

      - name: Test 🔍
        run: |
          # nosemgrep: generic.ci.security.use-frozen-lockfile.use-frozen-lockfile-pip
          pip install semgrep yamllint
          # The short minimumReleaseAge for our own first-party deps in
          # renovate.json is deliberate, and the rule's suggested opt-out
          # ("minimumReleaseAge": false) is invalid per the Renovate schema.
          semgrep --config=auto --error \
            --exclude-rule package_managers.renovate.renovate-missing-minimum-release-age.renovate-missing-minimum-release-age
          yamllint .

  autodoc:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: false

      - name: Regenerate documentation
        run: ./generate-doc.sh

      - name: Verify Changed files
        run: |
          if ! git diff --exit-code -- README.md; then
            echo "::error::Action documentation is out of date. Run \`./generate-doc.sh\`"
            exit 1
          fi


  test-scopes:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Trying action scopes-git-refs
        id: scopes-git-refs
        uses: ./
        with:
          action: scopes-git-refs
          mergify_config_path: zfixtures/mergify.yml

      - name: Trying action scopes-upload
        id: scopes-upload
        uses: ./
        with:
          action: scopes-upload
          token: ${{ secrets.MERGIFY_TOKEN }}
          scopes: scope1,scope2
          mergify_config_path: zfixtures/mergify.yml

      # No scopes input: an all-scopes pull request may carry no concrete
      # scope, exercising the empty-list path.
      - name: Trying action scopes-upload with all_scopes
        id: scopes-upload-all
        uses: ./
        with:
          action: scopes-upload
          token: ${{ secrets.MERGIFY_TOKEN }}
          all_scopes: true
          mergify_config_path: zfixtures/mergify.yml

      - name: Trying action scopes
        id: scopes-detection
        uses: ./
        with:
          action: scopes
          token: ${{ secrets.MERGIFY_TOKEN }}
          mergify_config_path: zfixtures/mergify.yml

      - name: Check scopes
        env:
          SCOPES: ${{ steps.scopes-detection.outputs.scopes }}
          EVERYTHING: ${{ fromJSON(steps.scopes-detection.outputs.scopes).everything }}
          EVERYTHING_BOOL: ${{ fromJSON(steps.scopes-detection.outputs.scopes).everything == 'true' }}
        run: |
          echo "SCOPES: $SCOPES"
          test "$EVERYTHING" == "true"
          test "$EVERYTHING_BOOL" == "true"

  test-junit:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Prepare mockserver
        run: |
          docker compose up -d
          sleep 1
          docker compose logs

      - name: Run action
        uses: ./
        with:
          action: junit-process
          token: fake-valid-token
          report_path: zfixtures/*.xml
          mergify_api_url: http://localhost:1080
          mergify_config_path: zfixtures/mergify.yml

      - name: Run action with error scenario ❌
        id: error500
        continue-on-error: true
        uses: ./
        with:
          action: junit-process
          token: fake-valid-token
          report_path: zfixtures/junit_example.xml
          mergify_api_url: http://localhost:1085
          mergify_config_path: zfixtures/mergify.yml

      - name: Dump mockserver logs
        if: always()
        run: |
          docker compose logs

  test-wait-jobs:
    needs: [test-junit, test-scopes, linters]
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Trying action
        id: scopes-detection
        uses: ./
        with:
          action: wait-jobs
          jobs: ${{ toJSON(needs) }}
          mergify_config_path: zfixtures/mergify.yml

  all-greens:
    if: ${{ !cancelled() }}
    needs:
      - linters
      - autodoc
      - test-scopes
      - test-junit
      - test-wait-jobs
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        uses: Mergifyio/gha-mergify-ci@f1feee72acd3b001406ff1cc0ce23e6033e26fe7 # v22
        with:
          action: wait-jobs
          jobs: ${{ toJSON(needs) }}

services:
  mockServer:
    image: mockserver/mockserver:7.1.0@sha256:c5cb3c49b71245a95e890b0a91d1e8e9e0014d2d53c7958971c9643b0d47ee6e
    command: -logLevel DEBUG
    ports:
      - 1080:1080
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/fake-ci-issue-api.json
    volumes:
      - type: bind
        source: zfixtures
        target: /config
  mockServerError:
    image: mockserver/mockserver:7.1.0@sha256:c5cb3c49b71245a95e890b0a91d1e8e9e0014d2d53c7958971c9643b0d47ee6e
    command: -logLevel DEBUG
    ports:
      - 1085:1080
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/fake-ci-issue-api-500.json
    volumes:
      - type: bind
        source: zfixtures
        target: /config

services:
  mockServer:
    image: mockserver/mockserver:6.1.0@sha256:900b7d4c13cc7c5b229de87435278807efb5eb13a1699b681e367c6c96c8b38d
    command: -logLevel DEBUG
    ports:
      - 1080:1080
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/fake-ci-issue-api.json
    volumes:
      - type: bind
        source: zfixtures
        target: /config
  mockServerError:
    image: mockserver/mockserver:6.1.0@sha256:900b7d4c13cc7c5b229de87435278807efb5eb13a1699b681e367c6c96c8b38d
    command: -logLevel DEBUG
    ports:
      - 1085:1080
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/fake-ci-issue-api-500.json
    volumes:
      - type: bind
        source: zfixtures
        target: /config

services:
  mockServer:
    image: mockserver/mockserver:6.0.0@sha256:f8e83858019cc48102c2920cf860d3c730854d839d89a9efbeac6f872323445b
    command: -logLevel DEBUG
    ports:
      - 1080:1080
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/fake-ci-issue-api.json
    volumes:
      - type: bind
        source: zfixtures
        target: /config
  mockServerError:
    image: mockserver/mockserver:6.0.0@sha256:f8e83858019cc48102c2920cf860d3c730854d839d89a9efbeac6f872323445b
    command: -logLevel DEBUG
    ports:
      - 1085:1080
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/fake-ci-issue-api-500.json
    volumes:
      - type: bind
        source: zfixtures
        target: /config
